name: Run security scans

on:
    workflow_dispatch:

permissions: {}

jobs:
  SSDLC:
    runs-on: [self-hosted, medium, jammy, private-endpoint]
    permissions:
      contents: read

    strategy:
      matrix:
        manifest:
        - mir
        - ubuntu-frame
      fail-fast: false

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
      - name: Run sbomber
        # FIXME: switch to official action when ready
        uses: Saviq/sbomber/.github/actions/run@a8028d3fb8070c2b19eef4a2b7a46fa92aab9268  # mir @ 2025.10.10
        with:
          sbomber-ref: mir
          manifest: ssdlc/${{ matrix.manifest }}.yaml
          artifact-name: ${{ matrix.manifest }}-results
      - if: ${{ failure() && runner.debug }}
        name: Setup tmate session
        uses: canonical/action-tmate@bda82e73586a62bf621881aab872a527c8a46e2d  # main @ 2026.03.02
        with:
          limit-access-to-actor: true
