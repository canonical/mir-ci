name: Run security scans

on:
    workflow_dispatch:

permissions: {}

jobs:
  SSDLC:
    runs-on: [self-hosted, medium, jammy, private-endpoint]
    permissions:
      contents: read

    strategy:
      matrix:
        manifest:
        - mir
        - ubuntu-frame
      fail-fast: false

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
      - name: Run sbomber
        # FIXME: switch to official action when ready
        uses: Saviq/sbomber/.github/actions/run@a8028d3fb8070c2b19eef4a2b7a46fa92aab9268  # mir @ 2025.10.10
        with:
          sbomber-ref: mir
          manifest: ssdlc/${{ matrix.manifest }}.yaml
          artifact-name: ${{ matrix.manifest }}-results
      - if: ${{ failure() && runner.debug }}
        name: Setup tmate session
        uses: canonical/action-tmate@bda82e73586a62bf621881aab872a527c8a46e2d  # main @ 2026.03.02
        with:
          limit-access-to-actor: true
