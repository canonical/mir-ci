name: 'Test Report'

on:
  workflow_run:
    workflows: ['Test']
    types:
    - completed

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
    - name: Report test results
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3.0.0
      with:
        artifact: /test-results-(.*)/
        name: "Test results"
        path: '**/junit-*.xml'
        reporter: java-junit
