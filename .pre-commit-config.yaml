exclude: |
  (?x)^(
    bin/.*|
    mir-ci/mir_ci/wayland/protocols/.*|
  )$
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
  hooks:
  - id: zizmor
    args:
    - --fix
- repo: https://github.com/rhysd/actionlint
  rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
  hooks:
  - id: actionlint
- repo: https://github.com/psf/black
  rev: 87928e6d6761a4a6d22250e1fee5601b3998086e  # frozen: 26.5.1
  hooks:
  - id: black
    args: [--line-length=120]
- repo: https://github.com/PyCQA/autoflake
  rev: 988e469555a54b0b16e39faf16ae84ff247fd337  # frozen: v2.3.3
  hooks:
  - id: autoflake
- repo: https://github.com/PyCQA/flake8
  rev: c48217e1fc006c2dddd14df54e83b67da15de5cd  # frozen: 7.3.0
  hooks:
  - id: flake8
    args: [--max-line-length=120]
- repo: https://github.com/PyCQA/isort
  rev: a333737ed43df02b18e6c95477ea1b285b3de15a  # frozen: 8.0.1
  hooks:
  - id: isort
    args: [-l, "120", --profile, black]
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: 0cbe8f6e54466b1b48f9d41f44abb4d06c061b5e  # frozen: v2.2.0
  hooks:
  - id: mypy
    additional_dependencies:
    - types-PyYAML
- repo: https://github.com/MarketSquare/robotframework-tidy
  rev: 3b080ac6493a1cec9f8142bd6c6b1282e572e521  # frozen: 4.18.0
  hooks:
  - id: robotidy
    args:
    - --configure
    - RenameTestCases:enabled=true
    - --configure
    - RenameVariables:enabled=true
    - --configure
    - IndentNestedKeywords:enabled=true
    - --configure
    - AlignKeywordsSection:enabled=true
    - --configure
    - AlignTestCasesSection:enabled=true
    - --configure
    - AlignTemplatedTestCases:enabled=true

- repo: https://github.com/executablebooks/mdformat
  rev: 2d496dbc18e31b83a1596685347ffe0b6041daf0  # frozen: 1.0.0
  hooks:
  - id: mdformat
    additional_dependencies:
    - mdformat-black
    - mdformat-beautysh
    - mdformat-gfm
    - mdformat-myst
    exclude: ^mir-ci/readme.md$

- repo: https://github.com/jackdewinter/pymarkdown
  rev: 6d3c1b70d44ea2202b23552af93aca3b5017ee83  # frozen: v0.9.36
  hooks:
  - id: pymarkdown
    alias: pymarkdown-fix
    name: PyMarkdown (autofix)
    args:
    - --config=.pymarkdown.json
    - fix
    exclude: ^mir-ci/readme.md$
  - id: pymarkdown
    alias: pymarkdown-scan
    name: PyMarkdown (scan)
    args:
    - --config=.pymarkdown.json
    - scan
    exclude: ^mir-ci/readme.md$
