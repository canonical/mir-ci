exclude: |
  (?x)^(
    bin/.*|
    mir-ci/mir_ci/wayland/protocols/.*|
  )$
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: ea2eb407b4cbce87cf0d502f36578950494f5ac9  # frozen: v1.23.1
  hooks:
  - id: zizmor
    args:
    - --fix
- repo: https://github.com/psf/black
  rev: c6755bb741b6481d6b3d3bb563c83fa060db96c9  # frozen: 26.3.1
  hooks:
  - id: black
    args: [--line-length=120]
- repo: https://github.com/PyCQA/autoflake
  rev: 2d3853a9f31d97783fb2e181d41cd82a6babd666  # frozen: v2.3.3
  hooks:
  - id: autoflake
- repo: https://github.com/PyCQA/flake8
  rev: d93590f5be797aabb60e3b09f2f52dddb02f349f  # frozen: 7.3.0
  hooks:
  - id: flake8
    args: [--max-line-length=120]
- repo: https://github.com/PyCQA/isort
  rev: a333737ed43df02b18e6c95477ea1b285b3de15a  # frozen: 8.0.1
  hooks:
  - id: isort
    args: [-l, "120", --profile, black]
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: a66e98df7b4aeeb3724184b332785976d062b92e  # frozen: v1.19.1
  hooks:
  - id: mypy
    additional_dependencies:
    - types-PyYAML
- repo: https://github.com/MarketSquare/robotframework-tidy
  rev: 3b080ac6493a1cec9f8142bd6c6b1282e572e521  # frozen: 4.18.0
  hooks:
  - id: robotidy
    args:
    - --configure
    - RenameTestCases:enabled=true
    - --configure
    - RenameVariables:enabled=true
    - --configure
    - IndentNestedKeywords:enabled=true
    - --configure
    - AlignKeywordsSection:enabled=true
    - --configure
    - AlignTestCasesSection:enabled=true
    - --configure
    - AlignTemplatedTestCases:enabled=true
