name: mir-ci
base: ubuntu@26.04

# `mir-ci` runs inside an Ubuntu container.
#
# - The `uv` SDK provides `uv`, which manages the Python interpreter and the
#   test harness. Several test dependencies installed at runtime by `--deps`
#   (e.g. `rpaframework`) declare `requires_python <3.14` and pin `numpy<2.0`,
#   which are not installable on the Python 3.14 that ships in Ubuntu 26.04, so
#   the harness runs against a uv-managed Python 3.12. uv downloads a prebuilt
#   CPython, so there is no need to build Python from source.
# - The `project-deps` SDK installs the system packages the build and tests
#   need (e.g. `libwayland-dev` for the pywayland protocol scanner, `snapd` for
#   the server snaps, `xvfb` to run the servers headless, and `pre-commit` for
#   the lint action). Edit it with `workshop sketch-sdk mir-ci` and re-eject
#   with `--eject --name deps`.
sdks:
  - name: uv
  - name: project-deps

actions:
  # Create the virtual environment and install the `mir_ci` package in editable
  # mode. Run this once after `workshop launch` (and again after pulling changes
  # that touch the dependencies).
  setup: |
    set -eu
    cd /project/mir-ci
    # A supported Python for the runtime test dependencies (see above).
    # `--seed` installs pip into the venv, which the `--deps` action uses to
    # install the test suites' Python dependencies.
    uv venv --clear --seed --python 3.12 "$HOME/.venv"
    # Install mir_ci and its harness. uv builds the pywayland protocol bindings
    # via the project's build hook using the system `libwayland-dev`.
    VIRTUAL_ENV="$HOME/.venv" uv pip install -e .

  # Install the dependencies (snaps, debs, pip packages) needed by the tests.
  # Forward any pytest selector, e.g. `workshop run mir-ci -- deps -k ubuntu_frame`.
  # With no arguments it installs the dependencies for all tests.
  deps: |
    export PATH="$HOME/.venv/bin:$PATH"
    cd /project/mir-ci/mir_ci
    python3 -m pytest --deps "$@"

  # List the available tests without running them.
  # e.g. `workshop run mir-ci -- list` or `workshop run mir-ci -- list -m smoke`.
  list: |
    export PATH="$HOME/.venv/bin:$PATH"
    cd /project/mir-ci/mir_ci
    python3 -m pytest --collect-only -q "$@"

  # Run the integration tests inside a virtual X11 server (Xvfb). The server
  # snaps bring their own Mir and render through Xvfb's X11 platform; the deb
  # servers use the system Mir the same way.
  # Forward any pytest argument, e.g. `workshop run mir-ci -- test -k ubuntu_frame`.
  test: |
    export PATH="$HOME/.venv/bin:$PATH"
    cd /project/mir-ci/mir_ci
    xvfb-run -a python3 -m pytest "$@"

  # Run the test suite's own self tests.
  self-test: |
    export PATH="$HOME/.venv/bin:$PATH"
    cd /project/mir-ci/mir_ci
    xvfb-run -a python3 -m pytest -m self "$@"

  # Run the static analysis checks (pre-commit, installed by the project-deps SDK).
  lint: |
    cd /project/mir-ci
    pre-commit run --all-files "$@"
